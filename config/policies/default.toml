schema_version = 1
policy_id = "default"

[git]
default_branch = "main"
allow_direct_main_writes = false
allow_push = false
require_clean_start = true
require_clean_finish = true
require_commit = true
require_snapshot = true

[execution]
writer_concurrency = 1
max_parallel_tasks = 3
sandbox_required = true
network_allowed_by_default = true
secrets_allowed_by_default = false

[review]
required = true
independent_reviewer = true
read_only_workspace = true
allowed_verdicts = [
  "PASS",
  "PASS_WITH_DEBT",
  "FIX",
  "SECURITY",
  "PERFORMANCE",
  "ARCHITECTURE",
  "HUMAN",
]

[recovery]
allowed_decisions = [
  "RESUME_SAFE",
  "ROLLBACK_SAFE",
  "BLOCK_HUMAN",
]
resume_requires_owned_diff = true
rollback_requires_snapshot = true
unknown_state_requires_human = true

[timeouts]
heartbeat_seconds = 60
stale_worker_seconds = 300
task_seconds = 3600
graceful_stop_seconds = 30

[backup]
before_write = true
git_bundle = true
working_tree_patch = true
controller_database = true
configuration = true
