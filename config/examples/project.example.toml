schema_version = 1

[project]
id = "example-project"
name = "Example Project"
enabled = false
policy = "default"

[paths]
repo = "/opt/docker/hermesops/workspaces/example-project"
data = "/opt/docker/hermesops/project-data/example-project"

[git]
default_branch = "main"
allow_push = false
require_clean = true

[execution]
writer_concurrency = 1
max_parallel_tasks = 3

[review]
required = true
