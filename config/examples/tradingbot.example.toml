schema_version = 1

[project]
id = "tradingbot"
name = "TradingBot"
enabled = false
policy = "default"

[paths]
repo = "/opt/docker/hermesops/workspaces/tradingbot"
data = "/opt/docker/hermesops/project-data/tradingbot"

[git]
default_branch = "main"
allow_push = false
require_clean = true

[execution]
writer_concurrency = 1
max_parallel_tasks = 1

[review]
required = true
