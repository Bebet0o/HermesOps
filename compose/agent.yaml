name: hermesops

services:
  sandbox-engine:
    image: ${HERMES_SANDBOX_ENGINE_IMAGE:?HERMES_SANDBOX_ENGINE_IMAGE is required}
    container_name: hermesops-sandbox-engine

    privileged: true
    restart: unless-stopped
    stop_grace_period: 90s

    environment:
      DOCKER_TLS_CERTDIR: ""
      DOCKER_HOST: unix:///run/hermes-docker/docker.sock

    command:
      - dockerd
      - "--host=unix:///run/hermes-docker/docker.sock"
      - "--group=${HERMES_GID:-1000}"
      - "--storage-driver=overlay2"
      - "--log-level=warn"

    volumes:
      - ../../state/sandbox-engine:/var/lib/docker
      - ../../runtime/sandbox-engine-socket:/run/hermes-docker
      - ../../state/sandboxes:/opt/docker/hermesops/state/sandboxes
      - ../../workspaces:/opt/docker/hermesops/workspaces
      - ../../project-data:/opt/docker/hermesops/project-data

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          docker
          --host unix:///run/hermes-docker/docker.sock
          info >/dev/null 2>&1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"

    networks:
      - hermes-sandbox-control

  hermes-agent:
    image: ${HERMES_AGENT_IMAGE:?HERMES_AGENT_IMAGE is required}
    container_name: hermesops-agent

    command:
      - gateway
      - run

    restart: unless-stopped
    stop_grace_period: 90s

    depends_on:
      sandbox-engine:
        condition: service_healthy

    ports:
      - "127.0.0.1:8642:8642"

    env_file:
      - ../../secrets/agent.env

    environment:
      HERMES_HOME: /home/hermes/.hermes
      HERMES_UID: ${HERMES_UID:-1000}
      HERMES_GID: ${HERMES_GID:-1000}

      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8642"

      DOCKER_HOST: unix:///run/hermes-docker/docker.sock
      DOCKER_TLS_CERTDIR: ""
      HERMES_DOCKER_BINARY: /usr/bin/docker
      TERMINAL_SANDBOX_DIR: /opt/docker/hermesops/state/sandboxes

    volumes:
      - ../../state/hermes-home:/home/hermes/.hermes
      - hermes-agent-src:/opt/hermes
      - ../../runtime/sandbox-engine-socket:/run/hermes-docker
      - ../../state/sandboxes:/opt/docker/hermesops/state/sandboxes
      - ../../workspaces:/opt/docker/hermesops/workspaces
      - ../../project-data:/opt/docker/hermesops/project-data

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen(
          'http://127.0.0.1:8642/health',
          timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

    security_opt:
      - no-new-privileges:true

    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"

    networks:
      - hermes-control

  hermes-webui:
    image: ${HERMES_WEBUI_IMAGE:?HERMES_WEBUI_IMAGE is required}
    container_name: hermesops-webui

    restart: unless-stopped
    stop_grace_period: 45s

    depends_on:
      hermes-agent:
        condition: service_healthy

    ports:
      - "127.0.0.1:8787:8787"

    env_file:
      - ../../secrets/webui.env

    environment:
      HERMES_WEBUI_HOST: 0.0.0.0
      HERMES_WEBUI_PORT: "8787"
      HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui

      WANTED_UID: ${HERMES_UID:-1000}
      WANTED_GID: ${HERMES_GID:-1000}

      HERMES_API_URL: http://hermes-agent:8642
      HERMES_WEBUI_CHAT_BACKEND: gateway
      HERMES_WEBUI_GATEWAY_BASE_URL: http://hermes-agent:8642

      # La Runs API d'approbation reste volontairement désactivée
      # jusqu'à validation du contrat approval_id Agent/WebUI.

    volumes:
      - ../../state/hermes-home:/home/hermeswebui/.hermes
      - hermes-agent-src:/home/hermeswebui/.hermes/hermes-agent:ro
      - ../../workspaces:/workspace:ro

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen(
          'http://127.0.0.1:8787/health',
          timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s

    security_opt:
      - no-new-privileges:true

    mem_limit: 2g
    cpus: 2.0
    pids_limit: 512

    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"

    networks:
      - hermes-control

networks:
  hermes-control:
    name: hermesops-control
    driver: bridge

  hermes-sandbox-control:
    name: hermesops-sandbox-control
    driver: bridge

volumes:
  hermes-agent-src:
    name: hermesops-agent-src
