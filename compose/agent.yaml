name: hermesops

services:
  hermes-agent:
    image: ${HERMES_AGENT_IMAGE:?HERMES_AGENT_IMAGE is required}
    container_name: hermesops-agent
    command:
      - gateway
      - run

    restart: unless-stopped
    stop_grace_period: 90s

    ports:
      - "127.0.0.1:8642:8642"

    env_file:
      - ../../secrets/agent.env

    environment:
      HERMES_HOME: /home/hermes/.hermes
      HERMES_UID: ${HERMES_UID:-1000}
      HERMES_GID: ${HERMES_GID:-1000}

      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8642"

    volumes:
      - ../../state/hermes-home:/home/hermes/.hermes

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen(
          'http://127.0.0.1:8642/health',
          timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

    security_opt:
      - no-new-privileges:true

    networks:
      - hermes-control

networks:
  hermes-control:
    name: hermesops-control
    driver: bridge
